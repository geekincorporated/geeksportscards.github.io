<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <meta charset="UTF-8">
    <title>eBay Active Items Viewer</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #fff; }
        .container-main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 18px;
        }
        .custom-header {
            background: #011b25;
            color: #222;
            text-align: center;
            font-family: inherit;
            margin: 0 auto;
            border: none;
            padding: 18px 0 14px 0;
            font-size: 1.45em;
            font-weight: bold;
            letter-spacing: 0.04em;
            max-width: 1600px;
        }
        table.dataTable { width: 100% !important; }
        #backToTopBtn {
            display: none;
            position: fixed;
            bottom: 32px;
            right: 32px;
            z-index: 999;
            background: #f5f5f5;
            border: 1.5px solid #bbb;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.10);
            cursor: pointer;
            font-size: 2em;
            color: #444;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, border 0.2s;
        }
        #backToTopBtn:hover {
            background: #e0e0e0;
            border-color: #888;
        }
    </style>
</head>

<body>
    <div class="custom-header">
        <img src="images/gsc-banner.png" alt="GSC Banner" style="display:block;width:75%;height:auto;margin:0 auto 10px auto;">
    </div>
    <div class="container-main">
        <div style="display: flex;">
            <div id="sidebar" style="min-width:220px;max-width:220px;padding:20px 10px 10px 0;margin-right:20px;border-right:1px solid #ccc;">
                <form id="filterForm">
                    <div style="margin-top:10px;margin-bottom:2px;font-weight:bold;">Format</div>
                    <div><input type="checkbox" name="filter" value="auction" id="filter_auction"> <label for="filter_auction">Auction</label></div>
                    <div><input type="checkbox" name="filter" value="bin" id="filter_bin"> <label for="filter_bin">Buy It Now</label></div>
                    <div style="margin-top:10px;margin-bottom:2px;font-weight:bold;">Category</div>
                    <div><input type="checkbox" name="category_filter" value="Singles" id="filter_category_singles"> <label for="filter_category_singles">Singles</label></div>
                    <div><input type="checkbox" name="category_filter" value="Lots" id="filter_category_lots"> <label for="filter_category_lots">Lots</label></div>
                    <div><input type="checkbox" name="category_filter" value="Sets" id="filter_category_sets"> <label for="filter_category_sets">Sets</label></div>
                    <div style="margin-top:10px;margin-bottom:2px;font-weight:bold;">Sport</div>
                    <div><input type="checkbox" name="sport_filter" value="Baseball" id="filter_sport_baseball"> <label for="filter_sport_baseball">Baseball</label></div>
                    <div><input type="checkbox" name="sport_filter" value="Basketball" id="filter_sport_basketball"> <label for="filter_sport_basketball">Basketball</label></div>
                    <div><input type="checkbox" name="sport_filter" value="Football" id="filter_sport_football"> <label for="filter_sport_football">Football</label></div>
                    <div><input type="checkbox" name="sport_filter" value="Hockey" id="filter_sport_hockey"> <label for="filter_sport_hockey">Hockey</label></div>

                    <div style="margin-top:10px;margin-bottom:2px;font-weight:bold;">Feature / Attribute</div>

                    <div><input type="checkbox" name="filter" value="rookie" id="filter_rookie"> <label for="filter_rookie">Rookie Card</label></div>
                    <div><input type="checkbox" name="filter" value="hof" id="filter_hof"> <label for="filter_hof">Hall of Fame</label></div>
                    <div><input type="checkbox" name="filter" value="uer" id="filter_uer"> <label for="filter_uer">Uncorrected Errors</label></div>
                    <div><input type="checkbox" name="filter" value="err" id="filter_err"> <label for="filter_err">Errors</label></div>
                    <div><input type="checkbox" name="filter" value="cor" id="filter_cor"> <label for="filter_cor">Corrected</label></div>

                    <div style="margin-top:14px;"><button type="button" id="clearAllFilters">Clear Filters</button></div>
                </form>
            </div>
            <div style="flex:1;">
                <div id="customSearchContainer" style="margin:12px 0 0 0;position:relative;max-width:340px;">
                    <input type="text" id="keywordSearch" placeholder="Search keywords..." style="width:100%;max-width:98vw;margin-bottom:12px;padding:5px 32px 5px 8px;font-size:1em;border:1px solid #bbb;border-radius:4px;box-sizing:border-box;height:36px;">
                    <button type="button" id="clearSearchBtn" title="Clear search" style="position:absolute;right:10px;top:0;bottom:12px;margin:auto 0;height:22px;width:22px;border:none;background:transparent;font-size:1.2em;line-height:1;color:#888;cursor:pointer;display:none;padding:0;">&#10006;</button>
                </div>
                <div style="margin:0 0 10px 0;display:flex;align-items:center;gap:18px;">
                    <div id="resultsCount" style="font-size:1.08em;font-weight:bold;color:#444;"></div>
                    <span id="toggleListViewIcon" title="Toggle list/grid view" style="display:inline-flex;align-items:center;gap:0;cursor:pointer;font-size:1.25em;padding:4px 10px;border-radius:6px;transition:background 0.15s;">
                      <i class="fa-solid fa-th" id="toggleListViewIconFa" style="color:#fff;"></i>
                    </span>
                    <!-- Sort dropdown removed -->
                </div>
                <div id="itemsGrid"></div>
            </div>
        </div>
        <button id="backToTopBtn" title="Back to top" aria-label="Back to top">&#8593;</button>
        <!-- Footer removed -->
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        // Back to top button logic
        $(window).on('scroll', function() {
            if ($(window).scrollTop() > 200) {
                $('#backToTopBtn').fadeIn();
            } else {
                $('#backToTopBtn').fadeOut();
            }
        });
        $('#backToTopBtn').on('click', function() {
            $('html, body').animate({scrollTop: 0}, 400);
        });
        const style = document.createElement('style');
        style.innerHTML = `
        #itemsGrid.list-view {
            display: flex;
            flex-wrap: wrap;
            gap: 24px 2.5%;
            margin-top: 18px;
        }
        #itemsGrid.list-view ul {
            display: contents;
        }
        .s-card.s-card--horizontal {
            width: 48%;
            min-width: 340px;
            box-sizing: border-box;
            transition: width 0.2s;
        }
        #itemsGrid.one-per-row .s-card.s-card--horizontal {
            width: 100% !important;
            min-width: 0 !important;
        }
        @media (max-width: 1100px) {
            .s-card.s-card--horizontal {
                width: 100%;
                min-width: 0;
            }
        }
        `;
        document.head.appendChild(style);


        let currentView = 'list';
        function isMobile() {
            return window.innerWidth <= 700;
        }

        // On page load and on resize, set list view as default and hide toggle on mobile; show toggle on desktop
        function updateViewForScreen() {
            if (isMobile()) {
                if (!$('#itemsGrid').hasClass('one-per-row')) {
                    $('#itemsGrid').addClass('one-per-row');
                }
                // Always force list view on mobile
                isListView = true;
                // Show but disable toggle on mobile
                $('#toggleListViewIcon').css({
                    'opacity': 0.5,
                    'pointer-events': 'none',
                    'user-select': 'none',
                    'cursor': 'not-allowed'
                });
            } else {
                $('#toggleListViewIcon').css({
                    'opacity': 1,
                    'pointer-events': 'auto',
                    'user-select': '',
                    'cursor': 'pointer'
                });
                // Optionally, remove one-per-row if not in list view
                if (!isListView) {
                    $('#itemsGrid').removeClass('one-per-row');
                }
            }
        }
        $(document).ready(function() {
            $('#toggleListViewIcon').show();
            updateViewForScreen();
        });
        $(window).on('resize', function() {
            updateViewForScreen();
        });

        function updateResultsCount(count) {
            let total = window._ebayData ? window._ebayData.length : count;
            $('#resultsCount').html('<b>Results:</b> <span style="font-weight:normal;">' + count + ' of ' + total + ' total items</span>');
        }

        function getAuctionTimeLeft(endDateStr) {
            if (!endDateStr) return '';
            let endDate = new Date(endDateStr);
            if (isNaN(endDate.getTime())) return '';
            let now = new Date();
            let diffMs = endDate - now;
            if (diffMs <= 0) return '<span style="color:#b12704;font-weight:bold;">Ended</span>';
            let diffSec = Math.floor(diffMs / 1000);
            let hours = Math.floor(diffSec / 3600);
            let minutes = Math.floor((diffSec % 3600) / 60);
            let days = Math.floor(hours / 24);
            let remHours = hours % 24;
            let timeLeftStr = '';
            if (days >= 1) {
                // Pad with zeros for HH and MM
                let pad = n => n.toString().padStart(2, '0');
                timeLeftStr = `${pad(days)}:${pad(remHours)}:${pad(minutes)} left`;
            } else {
                timeLeftStr = `${hours}h ${minutes}m left`;
            }
            // Format end time as Today/Yesterday/Date
            let endStr = '';
            let endDay = endDate.getDate(), nowDay = now.getDate();
            if (endDate.toDateString() === now.toDateString()) {
                endStr = endDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } else {
                let tomorrow = new Date(now);
                tomorrow.setDate(now.getDate() + 1);
                if (endDate.toDateString() === tomorrow.toDateString()) {
                    endStr = 'Tomorrow ' + endDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                } else {
                    endStr = endDate.toLocaleDateString() + ' ' + endDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                }
            }
            return `<span style=\"color:#b12704;font-weight:bold;font-size:0.97em;\">${timeLeftStr}</span> <span style=\"color:#555;font-size:0.97em;\">(${endStr})</span>`;
        }

        function renderList(items) {
            $('#itemsGrid').addClass('list-view');
            // Sort dropdown removed; use items as-is
            let sortedItems = [...items];
            let html = '<ul style="list-style:none;padding:0;margin:0;">';
            sortedItems.forEach(row => {
                const imgUrl = row['ebay Image URL 1'] && (row['ebay Image URL 1'].startsWith('http://') || row['ebay Image URL 1'].startsWith('https://'))
                    ? row['ebay Image URL 1']
                    : 'https://d3mop092koehdk.cloudfront.net/images/no-image-new.jpg';
                const title = row['Card Name'] || '';
                let link = row['ebay listing URL'] || '#';
                // Add affiliate parameters if it's an eBay link
                const affiliateParams = 'mkcid=1&mkrid=711-53200-19255-0&siteid=0&campid=5339025312&customid=&toolid=10001&mkevt=1';
                if (link.includes('ebay.com')) {
                  // If link already has ?, append with &; else, with ?
                  link += (link.includes('?') ? '&' : '?') + affiliateParams;
                }
                const price = row['Current Price'] ? `$${row['Current Price']}` : '';
                const bids = row['Bid Count'] ? `${row['Bid Count']} bid${row['Bid Count'] == 1 ? '' : 's'}` : '';
                const shipping = row['Shipping Cost'] ? `+$${row['Shipping Cost']} Shipping` : '';
                const timeLeft = getAuctionTimeLeft(row['End Date']);
                const itemNum = row['ItemID'] || '';
                html += `
<li class="s-card s-card--horizontal" style="display:flex;align-items:flex-start;border:1px solid #ddd;border-radius:8px;margin-bottom:18px;padding:0;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
  <div class="su-card-container su-card-container--horizontal" style="display:flex;width:100%;">
    <div class="su-card-container__media" style="flex:0 0 220px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;position:relative;">
      <div style="position:absolute;top:10px;right:10px;z-index:2;display:flex;flex-direction:column;gap:7px;align-items:flex-end;">
        <a href="#" class="open-image-modal" data-imgs='${(() => {
          // Collect all ebay Image URL N and ebay Variation Image URL N fields
          const imgs = [];
          let n = 1;
          while (row[`ebay Image URL ${n}`]) {
            imgs.push(row[`ebay Image URL ${n}`]);
            n++;
          }
          n = 1;
          while (row[`ebay Variation Image URL ${n}`]) {
            imgs.push(row[`ebay Variation Image URL ${n}`]);
            n++;
          }
          return JSON.stringify(imgs);
        })()}' data-img-idx="0" title="View Larger Image" style="text-decoration:none;">
          <i class="fas fa-eye" style="font-size:0.98em;color:#222;background:#fff;border-radius:50%;padding:3.5px;box-shadow:0 1px 4px rgba(0,0,0,0.10);"></i>
        </a>
        <a href="${link}" target="_blank" style="text-decoration:none;" title="Open eBay Listing">
          <i class="fas fa-external-link" style="font-size:0.98em;color:#222;background:#fff;border-radius:50%;padding:3.5px;box-shadow:0 1px 4px rgba(0,0,0,0.10);"></i>
        </a>
      </div>
      <img class="lazy-img" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" data-src="${imgUrl}" alt="${title}" style="width:240px;height:240px;object-fit:contain;border-radius:4px;background:#f8f8f8;">
      <div style="color:#888;font-size:0.75em;margin-top:8px;text-align:center;width:100%;">
        ${itemNum ? `Item ID: ${itemNum}` : ''}
        ${row['SSN'] ? `<div style='margin-top:2px;'>Seller: ${row['SSN']}</div>` : ''}
      </div>
    </div>
    <div class="su-card-container__content" style="flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:16px 0;">
      <div>
        <a href="${link}" target="_blank" style="text-decoration:none;color:#222;">
          <div class="s-card__title" style="font-size:1em;font-weight:bold;margin-bottom:12px;">${title}</div>
        </a>
        <div style="font-size:0.80em !important;color:#444;margin-bottom:8px;">
          <span style="font-weight:bold;">Player:</span> ${row['Player/Athlete'] || ''}<br>
          <span style="font-weight:bold;">Team:</span> ${row['Team'] || ''}<br>
          ${row['Attributes'] && row['Attributes'].trim() !== '' ? `<span style=\"font-weight:bold;\">Attributes:</span> ${row['Attributes']}<br>` : ''}
          <div style='height:8px;'></div>
          <span style="font-weight:bold;">Sport:</span> ${row['Sport'] || ''}<br>
          ${row['Manufacturer'] ? `<span style="font-weight:bold;">Manufacturer:</span> ${row['Manufacturer']}<br>` : ''}
          ${row['Brand'] ? `<span style="font-weight:bold;">Brand:</span> ${row['Brand']}<br>` : ''}
          <span style="font-weight:bold;">Set:</span> ${row['Set Name'] || ''}<br>
          <span style="font-weight:bold;">Features:</span> ${row['Features'] || ''}<br>
          ${row['Additional Information'] 
            ? `<span style=\"font-weight:bold;\">Additional Information:</span> ${row['Additional Information']}<br><div style='height:8px;'></div>` 
            : `<div style='height:8px;'></div>`}
          ${(() => {
            let formatHtml = '';
            if (row['Variation'] == 1) {
              formatHtml += `<span style=\"font-weight:bold;\">Quantity Available:</span> ${row['Quantity Available'] || ''}<br>`;
            } else {
              formatHtml += `<span style=\"font-weight:bold;\"></span> ${(row['Category'] && row['Category'].toLowerCase() === 'singles') ? 'Single' : (row['Category'] || '')}<br>`;
            }
            // Buy It Now or Auction label
            if (row['Format'] && row['Format'].toLowerCase() === 'bin') {
              formatHtml += `<span style='font-family:sans-serif;font-weight:bold;vertical-align:middle;'><span style='color:#e53238;'>e</span><span style='color:#0064d2;'>B</span><span style='color:#f5af02;'>a</span><span style='color:#86b817;'>y</span></span> Buy It Now`;
              // Add blank space and Buy It Now button as a link
              let btnLink = row['ebay listing URL'] || '#';
              const affiliateParams = 'mkcid=1&mkrid=711-53200-19255-0&siteid=0&campid=5339025312&customid=&toolid=10001&mkevt=1';
              if (btnLink.includes('ebay.com')) {
                btnLink += (btnLink.includes('?') ? '&' : '?') + affiliateParams;
              }
              formatHtml += `<div style='height:16px;'></div><a href="${btnLink}" target="_blank" style='background:#0d6efd;color:#fff;border:none;border-radius:4px;padding:8px 22px;font-size:1em;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block;'>Buy It Now</a>`;
            } else if (row['Format'] && row['Format'].toLowerCase() === 'auction') {
              formatHtml += `<span style='font-family:sans-serif;font-weight:bold;vertical-align:middle;'><span style='color:#e53238;'>e</span><span style='color:#0064d2;'>B</span><span style='color:#f5af02;'>a</span><span style='color:#86b817;'>y</span></span> Auction`;
              // Add blank space and Place Bid button as a link
              let btnLink = row['ebay listing URL'] || '#';
              const affiliateParams = 'mkcid=1&mkrid=711-53200-19255-0&siteid=0&campid=5339025312&customid=&toolid=10001&mkevt=1';
              if (btnLink.includes('ebay.com')) {
                btnLink += (btnLink.includes('?') ? '&' : '?') + affiliateParams;
              }
              formatHtml += `<div style='height:16px;'></div><a href="${btnLink}" target="_blank" style='background:#0d6efd;color:#fff;border:none;border-radius:4px;padding:8px 22px;font-size:1em;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block;'>Place Bid</a>`;
            } else if (row['Format']) {
              formatHtml += row['Format'];
            }
            formatHtml += '<br>';
            return formatHtml;
          })()}
        </div>
      </div>
      <div class="su-card-container__attributes su-card-container__attributes--has-secondary" style="margin-top:8px;">
        <div class="su-card-container__attributes__primary">
          <div class="s-card__attribute-row" style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:1.50em;font-weight:bold;color:#111;">${price}</span>
            <span style="font-size:0.80em !important;font-weight:normal;color:#555;">${shipping}</span>
          </div>
          <div class="s-card__attribute-row" style="font-size:0.85em;color:#555;">${bids} ${timeLeft ? `<span style='margin-left:8px;'>${timeLeft}</span>` : ''}</div>
        </div>
        <!-- Item number moved below image -->
      </div>
    </div>
  </div>
</li>
                `;
            });
            html += '</ul>';
            $('#itemsGrid').html(html);
        }
        // Toggle icon for one-per-row view (desktop only)
        let isListView = false;
        $('#toggleListViewIcon').on('click', function() {
            if (isMobile()) return; // Disable toggle on mobile
            isListView = !isListView;
            if (isListView) {
                $('#itemsGrid').addClass('one-per-row');
                $('#toggleListViewIconFa').removeClass('fa-th').addClass('fa-list').css('color', '#111');
                $(this).css('background', '#e6f2fb');
            } else {
                $('#itemsGrid').removeClass('one-per-row');
                $('#toggleListViewIconFa').removeClass('fa-list').addClass('fa-th').css('color', '#111');
                $(this).css('background', '');
            }
        });

        function filterData(data) {
            const selected = $('#filterForm input[type=checkbox][name=filter]:checked').map(function(){ return this.value; }).get();
            const selectedCategories = $('#filterForm input[type=checkbox][name=category_filter]:checked').map(function(){ return this.value; }).get();
            const selectedSports = $('#filterForm input[type=checkbox][name=sport_filter]:checked').map(function(){ return this.value; }).get();
            const keyword = $('#keywordSearch').val().trim().toLowerCase();
            if (!selected.length && !selectedCategories.length && !selectedSports.length && !keyword) return data;
            return data.filter(row => {
                // Keyword search (OR across main fields)
                if (keyword) {
                    let found = false;
                    const fields = ['Title','Player/Athlete','Team','Card Name','Features','Attributes','Category','Sport','Current Price','ItemID'];
                    for (let f of fields) {
                        if (row[f] && String(row[f]).toLowerCase().includes(keyword)) { found = true; break; }
                    }
                    if (!found) return false;
                }
                for (let filter of selected) {
                    if (filter === 'rookie') {
                        if (!((row['Features'] && row['Features'].toLowerCase().includes('rookie')) || (row['Card Name'] && row['Card Name'].toLowerCase().includes('rookie')))) return false;
                    } else if (filter === 'hof') {
                        if (!(row['Attributes'] && row['Attributes'].toLowerCase().includes('hall of fame'))) return false;
                    } else if (filter === 'uer') {
                        if (!(row['Card Name'] && row['Card Name'].trim().endsWith('UER'))) return false;
                    } else if (filter === 'err') {
                        if (!(row['Card Name'] && row['Card Name'].trim().endsWith('ERR'))) return false;
                    } else if (filter === 'cor') {
                        if (!(row['Card Name'] && row['Card Name'].trim().endsWith('COR'))) return false;
                    } else if (filter === 'auction') {
                        if (!(row['Format'] && row['Format'].toLowerCase() === 'auction')) return false;
                    } else if (filter === 'bin') {
                        if (!(row['Format'] && (row['Format'].toLowerCase() === 'bin' || row['Format'].toLowerCase() === 'fixedprice'))) return false;
                    }
                }
                if (selectedCategories.length) {
                    let cat = (row['Category'] || '').trim().toLowerCase();
                    let found = false;
                    for (let catVal of selectedCategories) {
                        let val = catVal.trim().toLowerCase();
                        // Allow partial match for common cases (e.g. 'singles' in 'Single Cards')
                        if (cat.includes(val)) { found = true; break; }
                    }
                    if (!found) return false;
                }
                if (selectedSports.length) {
                    let sport = (row['Sport'] || '').toLowerCase();
                    let found = false;
                    for (let sportVal of selectedSports) {
                        let val = sportVal.toLowerCase();
                        if (sport === val) { found = true; break; }
                    }
                    if (!found) return false;
                }
                // Listing Format filter removed
                return true;
            });
        }

        // Sort dropdown removed

        $.getJSON('data/ebay_active_items.json', function(data) {
            window._ebayData = data;
            if (!data.length) {
                $('#itemsGrid').html('<div>No data found.</div>');
                updateResultsCount(0);
                return;
            }

            // Set default view button state
            $('#listViewBtn').addClass('active');
            $('#gridViewBtn').remove(); // Remove grid view button
            // Initial render
            renderList(data);
            updateResultsCount(data.length);

            function updateFilters() {
                const filtered = filterData(data);
                updateResultsCount(filtered.length);
                renderList(filtered);
            }

            $('#filterForm input[type=checkbox][name=filter]').on('change', updateFilters);
            $('#filterForm input[type=checkbox][name=category_filter]').on('change', updateFilters);
            $('#filterForm input[type=checkbox][name=sport_filter]').on('change', updateFilters);
        // Listing Format filter removed

            // Show/hide clear X button and handle clear
            function updateClearBtn() {
                const val = $('#keywordSearch').val();
                if (val) {
                    $('#clearSearchBtn').show();
                } else {
                    $('#clearSearchBtn').hide();
                }
            }
            $('#keywordSearch').on('input', function() {
                updateFilters();
                updateClearBtn();
            });
            $('#clearSearchBtn').on('click', function() {
                $('#keywordSearch').val('');
                updateFilters();
                updateClearBtn();
                $('#keywordSearch').focus();
            });
            // Initial state
            updateClearBtn();

            $('#clearAllFilters').on('click', function() {
                $('#filterForm input[type=checkbox][name=filter]').prop('checked', false);
                $('#filterForm input[type=checkbox][name=category_filter]').prop('checked', false);
                $('#filterForm input[type=checkbox][name=sport_filter]').prop('checked', false);
                $('#keywordSearch').val('');
                updateClearBtn();
                updateResultsCount(data.length);
                renderList(data);
            });

            // List view is always active; no toggle needed
        });
    // Modal carousel for large image previewf
    const modalHtml = `
      <div id="imageModal" style="display:none !important;position:fixed;z-index:9999;left:0;top:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;">
        <div id="modalImageContainer" style="position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;">
          <div style="position:relative;display:flex;align-items:center;justify-content:center;width:100%;">
            <img id="modalImage" src="" alt="Large Preview" loading="lazy" style="max-width:90vw;max-height:70vh;border-radius:10px;box-shadow:0 4px 32px rgba(0,0,0,0.25);background:#fff;display:block;">
          </div>
          <div style="margin-top:18px;display:flex;gap:10px;justify-content:center;align-items:center;max-width:92vw;overflow-x:auto;">
            <button id="carouselPrev" style="font-size:2.2em;background:rgba(0,0,0,0.18);color:#fff;border:none;border-radius:50%;width:48px;height:48px;cursor:pointer;z-index:10001;transition:opacity 0.2s;display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-chevron-left"></i>
            </button>
            <div id="modalThumbnails" style="display:flex;gap:10px;justify-content:center;align-items:center;"></div>
            <button id="carouselNext" style="font-size:2.2em;background:rgba(0,0,0,0.18);color:#fff;border:none;border-radius:50%;width:48px;height:48px;cursor:pointer;z-index:10001;transition:opacity 0.2s;display:flex;align-items:center;justify-content:center;">
              <i class="fas fa-chevron-right"></i>
            </button>
          </div>
          <div style="margin-top:18px;display:flex;justify-content:center;width:100%;">
            <button id="closeImageModal" style="font-size:1.1em;padding:8px 32px;background:#222;color:#fff;border:none;border-radius:6px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.10);">Close</button>
          </div>
        </div>
      </div>
    `;

    $(document.body).append(modalHtml);
    // Ensure modal is hidden on page load
    $('#imageModal').hide();
    let carouselImgs = [];
    let carouselIdx = 0;
    function updateCarouselBtns() {
      if (carouselImgs.length > 1) {
        $('#carouselPrev').css('visibility', 'visible');
        $('#carouselNext').css('visibility', 'visible');
      } else {
        $('#carouselPrev').css('visibility', 'hidden');
        $('#carouselNext').css('visibility', 'hidden');
      }
      // Gray out and disable pointer events if at the ends
      if (carouselIdx === 0) {
        $('#carouselPrev').css({'opacity': 0.4, 'pointer-events': 'none'});
      } else {
        $('#carouselPrev').css({'opacity': 1, 'pointer-events': 'auto'});
      }
      if (carouselIdx === carouselImgs.length - 1) {
        $('#carouselNext').css({'opacity': 0.4, 'pointer-events': 'none'});
      } else {
        $('#carouselNext').css({'opacity': 1, 'pointer-events': 'auto'});
      }

      // Render thumbnails
      let thumbsHtml = '';
      for (let i = 0; i < carouselImgs.length; i++) {
        thumbsHtml += `<img src="${carouselImgs[i]}" data-thumb-idx="${i}" loading="lazy" style="width:54px;height:54px;object-fit:cover;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.10);border:2.5px solid ${i === carouselIdx ? '#0074d9' : '#fff'};cursor:pointer;transition:border 0.15s;">`;
      }
      $('#modalThumbnails').html(thumbsHtml);
    }
    // Only open modal on click, never on page load
    $(document).on('click', '.open-image-modal', function(e) {
      e.preventDefault();
      carouselImgs = [];
      carouselIdx = 0;
      try {
        carouselImgs = JSON.parse($(this).attr('data-imgs')) || [];
      } catch { carouselImgs = []; }
      if (!carouselImgs.length) return;
      carouselIdx = Number($(this).attr('data-img-idx')) || 0;
      $('#modalImage').attr('src', carouselImgs[carouselIdx]);
      $('#imageModal').fadeIn(120);
      updateCarouselBtns();
      // ...no magnifier...
    });

    // Thumbnail click handler
    $(document).on('click', '#modalThumbnails img', function(e) {
      const idx = Number($(this).attr('data-thumb-idx'));
      if (!isNaN(idx) && idx !== carouselIdx) {
        carouselIdx = idx;
        $('#modalImage').attr('src', carouselImgs[carouselIdx]);
        updateCarouselBtns();
        // ...no magnifier...
      }
    });
    $(document).on('click', '#carouselPrev', function(e) {
      e.stopPropagation();
      if (carouselIdx > 0) {
        carouselIdx--;
        $('#modalImage').attr('src', carouselImgs[carouselIdx]);
        updateCarouselBtns();
        // ...no magnifier...
      }
    });
    $(document).on('click', '#carouselNext', function(e) {
      e.stopPropagation();
      if (carouselIdx < carouselImgs.length - 1) {
        carouselIdx++;
        $('#modalImage').attr('src', carouselImgs[carouselIdx]);
        updateCarouselBtns();
        // ...no magnifier...
      }
    });
    $(document).on('click', '#closeImageModal', function(e) {
      e.stopPropagation();
      $('#imageModal').fadeOut(120);
      $('#modalImage').attr('src', '');
      carouselImgs = [];
      carouselIdx = 0;
    });
    // Also close modal if clicking outside modal content (on overlay)
    $(document).on('click', '#imageModal', function(e) {
      if (e.target.id === 'imageModal') {
        $('#imageModal').fadeOut(120);
        $('#modalImage').attr('src', '');
        carouselImgs = [];
        carouselIdx = 0;
      }
    });
    // Intersection Observer for lazy loading images
    (function() {
      const observer = new window.IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src && img.src !== img.dataset.src) {
              img.src = img.dataset.src;
            }
            obs.unobserve(img);
          }
        });
      }, { rootMargin: '100px' });
      function observeImages() {
        document.querySelectorAll('img.lazy-img').forEach(img => {
          if (img.dataset.src && img.src !== img.dataset.src) {
            observer.observe(img);
          }
        });
      }
      // Observe after each render
      const origRenderList = renderList;
      renderList = function(items) {
        origRenderList(items);
        observeImages();
      };
      // Initial call in case images are present on load
      document.addEventListener('DOMContentLoaded', observeImages);
    })();
    </script>
    </script>
</body>
</html>
