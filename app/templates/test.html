<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Trading Cards</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa; /* Light gray background */
        }
        .card-img-top {
            width: 100%; /* Make the image take the full width of the cell */
            height: auto; /* Maintain aspect ratio */
            object-fit: contain; /* Ensure the entire image is visible while maintaining aspect ratio */
            display: block; /* Make sure the image is displayed as a block */
            cursor: pointer; /* Show pointer cursor on hover */
        }
        #cardsTable td {
            vertical-align: middle; /* Center align content vertically */
            text-align: left; /* Align text to the left */
            white-space: nowrap; /* Prevent text from wrapping */
        }
    </style>
</head>
<body>
    <div class="container mt-4" style="margin-bottom: 50px;">
        <div class="table-responsive">
            <table id="cardsTable" class="display table table-striped">
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Item Title</th>
                        <th>Sport</th>
                        <th>Graded</th>
                        <th>Grade</th>
                        <th>Auction Price</th>
                        <th>BIN Price</th>
                        <th>Shipping Cost</th>
                        <th>Time Left</th>
                        <!-- <th>Action</th> -->
                    </tr>
                </thead>
                <tbody id="dataContainer">
                    <!-- Rows will be dynamically inserted here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Bootstrap Modal for Image Display -->
    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="imageModalLabel">Image Preview</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <img id="modalImage" src="" class="img-fluid" alt="Original Image">
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS (Optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <!-- Your Custom JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
